name: Daily Parallel FX

on:
  workflow_dispatch:
  schedule:
    - cron: "10 13 * * *"

permissions:
  contents: write

jobs:
  update-parallel-rate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run parallel rate updater
        run: python src/parallel_rate.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fx_parallel_ves_usd_history.csv
          git diff --staged --quiet || git commit -m "Update parallel FX rate"
          git push
