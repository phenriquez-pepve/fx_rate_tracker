name: Build App Dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * *"

permissions:
  contents: write

jobs:
  build-app-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build final app dataset
        run: python src/build_app_dataset.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fx_rates_ves_usd_combined.csv data/fx_rates_ves_usd_app_dataset.csv
          git diff --staged --quiet || git commit -m "Build final FX app datasets"
          git push
